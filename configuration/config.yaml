# Use ____________________ Edit default settings

###############################################################################

### RESOURCES ----------------------------------------------------------------------------------------
resources:
  cpus: 8           # Set maximum cpus usage (for multithreading, default: "8") [INT]
  ram: 16           # Set maximum memory usage (in Gb, default: "16") [INT]
  tmpdir: '$TMPDIR' # Temporary directory (default: "$TMPDIR")
  ## Examples:
    ## '$TMPDIR'  # System variable $TMPDIR (default)
    ## '.'        # Local (i.e. GeVarLi root directory)
    ## '/scratch' # HPC (set it to match your HPC usage)

### CONSENSUS ----------------------------------------------------------------------------------------
consensus:
  mincov: 30 # Minimum coverage, mask lower regions with "N" (default: "30") [INT]
  minaf: 0.2 # Minimum allele frequency allowed (default: "0.2") [FLOAT]
  path: 'resources/genomes/'                # Path to genomes references
  reference: 'SARS-CoV-2_Wuhan_MN-908947-3' # Your reference, in fasta format
  # Available options:
    #- 'SARS-CoV-2_Wuhan_MN-908947-3'       # SARS-CoV-2 (default)
    #
    #- 'Monkeypox-virus_Zaire_AF-380138-1'  # Monkeypox  (without BamClipper and Pangolin)
    #- 'Monkeypox-virus_UK_MT-903345-1'     # Monkeypox  (without Pangolin)
    #- 'Swinepox-virus_India_MW-036632-1'   # Swinepox   (without BamClipper and Pangolin)
    #
    #- 'Ebola-virus_Zaire_AF-272001-1'      # Ebola      (without Nextclade and Pangolin)
    #- 'Ebola-virus_Sudan_MH-121162-1'      # Ebola      (without BamClipper, Nextclade and Pangolin)
    #- 'Ebola-virus_Bombali_NC-039345-1'    # Ebola      (without BamClipper, Nextclade and Pangolin)
    #- 'Ebola-virus_Bundibugyo_FJ-217161.1' # Ebola      (without BamClipper, Nextclade and Pangolin)
    #- 'Ebola-virus_Reston_MF-540571-1'     # Ebola      (without BamClipper, Nextclade and Pangolin)
    #- 'Ebola-virus_Tai-Forest_KU-182910-1' # Ebola      (without BamClipper, Nextclade and Pangolin)
    #
    #- 'Nipah-virus_Malaysia_AJ-564622-1'   # Nipah      (without Nextclade and Pangolin)
    #
    #- 'HIV-1_HXB2_K-03455-1'               # HIV-1      (without BamClipper, Nextclade and Pangolin)
    #
    #- 'Add_your_favorite_genome_ref'       # Custom     (without BamClipper, Nextclade and Pangolin)
    #
  iupac: ''  # Output variants in the form of IUPAC ambiguity codes (default: deactivate)
  # Available options:
    #- ''        # Deactivate (default)
    #- '--iupac' # Activate

### ALIGNER ------------------------------------------------------------------------------------------
aligner: 'bwa' # Select your favorite aligner, bwa (default) or bowtie2
# Available options:
  #- 'bwa'     # Faster (default)
  #- 'bowtie2' # Slower, "sensitivity" requiried (see below "Bowtie2" options)

### FASTQ-SCREEN -------------------------------------------------------------------------------------
fastq-screen:
  config: 'configuration/fastq-screen' # Path to the fastq-screen configuration file
  subset: 10000 # Don't use whole sequences, but a subset reads (default: "10000") [INT] (0=all)

### MULTIQC ------------------------------------------------------------------------------------------
multiqc:
  config: 'configuration/multiqc.yaml' # Path to the multiqc configuration file
  tag: '' # Use only modules which tagged with this keyword

### CUTADAPT -----------------------------------------------------------------------------------------
cutadapt:
  length: '50' # Discard reads shorter than 'length' after trim (default: "50")
  kits:        # Sequence of an adapter ligated to the 3' end of the first read
    truseq:  'AGATCGGAAGAGC'         # Illumina "TruSeq" or "ScriptSeq" based libraries kits
    nextera: 'CTGTCTCTTATACACATC'    # Illumina "Nextera" or "TruSight" based libraries kits
    small:   'TGGAATTCTCGGGTGCCAAGG' # Illumina "Small" based libraries kits

### SICKLE-TRIM --------------------------------------------------------------------------------------
sickle-trim:
  quality: '30'      # Phred score limit (default: "30")
  length: '50'       # Read length limit after trim (default: "50")
  command: 'pe'      # Reading (default and should be "pe" for paired-end sequences)
  encoding: 'sanger' # Quality encoding (default, and should be "sanger")
  # Only for information:
    #- 'sanger'   # for CASAVA >= 1.8 for "recent" Illumina reads (default)
    #- 'illumina' # for CASAVA 1.3 to 1.7 for "old" Illumina reads
    #- 'solexa'   # for CASAVA < 1.3 for Solexa

### BAMCLIPPER ---------------------------------------------------------------------------------------
bamclipper:
  clipping: 'no' # Do you need to clip amplicon primers ? Need to provide primers BEDPE file
  # Available options:
    #- 'no'  # Deactivate (default)
    #- 'yes' # Activate
  path: 'resources/primers/bedpe/' # Path to primers bedpe files
  primers: 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V3'
  # Reference sequence names and coordinates of BAM and BED are assumed to be derived from identical reference sequences
  # Available options:
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V1'           # SARS-CoV-2 Artic V1
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V2'           # SARS-CoV-2 Artic V2
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V3'           # SARS-CoV-2 Artic V3
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V4'           # SARS-CoV-2 Artic V4 (not based on V3, see Artic README)
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_arctiv-primers-V4-1'        # SARS-CoV-2 Artic V4.1 (update to the V4, see Artic README)
    #- 'Ebola-virus_Zaire_KR-063671-1_artic-primers-V1'          # EBOV Artic V1
    #- 'Ebola-virus_Zaire_AF-272001-1_artic-primers-V2'          # EBOV Artic V2 (based on AF272001.1)
    #- 'Ebola-virus_Zaire_KR-063671-1_artic-primers-V3'          # EBOV Artic V3
    #- 'Nipah-virus_Malaysia_AJ-564622-1_artic-primers-V1'       # NIV Artic V1
    #- 'Monkeypox-virus_UK_MT-903345-1_custom-VGCARE-primers-V1' # MPXV VGCARE V1
    #- 'Add_your_favorite_amplicon_kit'                          # Custom
  upstream: '1'   # (default: 1)
  downstream: '5' # (default: 5)

### BWA ----------------------------------------------------------------------------------------------
bwa:
  path: 'resources/indexes/bwa/' # Path to BWA indexes
  algorithm: '' # Algorithm for constructing BWA index (default: auto)
  # Available options:
    #- ''         # Auto-select (default)
    #- '-a is'    # Moderately fast, but does not work with database larger than 2GB
    #- '-a bwtsw' # This method works with the whole human genome

### BOWTIE2 ------------------------------------------------------------------------------------------
bowtie2:
  path: 'resources/indexes/bowtie2/' # Path to Bowtie2 indexes
  sensitivity: '--very-sensitive'    # Bowtie2 sensitivity preset (default: "--very-sensitive")
  # Available options:
    #- '--very-fast'      # Same as options: "-D 5 -R 1 -N 0 -L 22 -i S,0,2.50"
    #- '--fast'           # Same as options: "-D 10 -R 2 -N 0 -L 22 -i S,0,2.50"
    #- '--sensitive'      # Same as options: "-D 15 -R 2 -N 0 -L 22 -i S,1,1.15"
    #- '--very-sensitive' # Same as options: "-D 20 -R 3 -N 0 -L 20 -i S,1,0.50" (default)
  algorithm: '' # Algorithm for constructing BT2 index
  # Available options:
    #- ''              # (default)
    #- '--large-index' # Force generated index to be "large", even if reference has fewer than 4 billion nucleotides

### NEXTCLADE ----------------------------------------------------------------------------------------
nextclade:
  path: 'resources/nextclade/' # Path to nextclade datasets
  #dataset: 'sars-cov-2' # Nextclade dataset (depreciated, set by Start_GeVarLi.sh)
  # Available options:
    #- 'sars-cov-2' # SARS-CoV-2 (now default with SARS-CoV-2_Wuhan-WIV04_2019)
    #- 'MPXV'       # Monkeypox all clades (now default with Monkeypox-virus_Zaire)
    #- 'hMPXV'      # human Monkeypox
    #- 'hMPXV_B1'   # human Monkeypox Lineage B1*

### GISAID (soon) ------------------------------------------------------------------------------------
gisaid:
  username: 'username'
  threshold: '30'
  name: 'hCoV-19'
  country: 'France'
  identifier: ''
  year: '2022'


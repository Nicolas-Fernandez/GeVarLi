###############################################################################
################################## GENERAL ####################################
###############################################################################

###############################################################################
resources:
  cpus: '8' # Set maximum cpus usage (for multithreading, default: "8") [INT]
  ram: '16' # Set maximum memory usage (in Gb, default: "16") [INT]
  tmp_dir: '$TMPDIR' # Temporary directory
  # Available options (just for information, not exhaustive)
    ### '$TMPDIR'  # System variable $TMPDIR (default)
    ### '.'        # Local (i.e. GeVarLi directory)
    ### '/scratch' # HPC (set it to match your HPC usage)
    ### ''         # Custom (set your own)

###############################################################################
modules: # GeVarLi modules analysis
  # Available options, set at least one: 
  #- 'quality'   # Perform reads quality control (FastQC, Fastq-Screen, MultiQC)      default: ON
  #- 'trimming'  # Keep trimmed reads files after alignment (Cutadapt / Sickle-trim) default: OFF
  #- 'cleapping' # Perform reads clipping (Bamclipper)                               default: OFF
  - 'consensus' # Perform reads mapping to reference (BWA, Bowtie2, Minimap2)        default: ON
  #- 'covstats'  # Perform coverage statistics (Fagstat, Covstats)                    default: ON
  #- 'nextclade' # Perform nextclade clade assignation (Nexclade)                     default: ON
  #- 'pangolin'  # Perform pangolin lineage assignation (Pangolin)                   default: OFF
  ###- 'gisaid'    # Perform gisaid submission (GisAid : TODO)                       default: OFF
  
###############################################################################
consensus:
  path: 'resources/genomes/' # Path to genomes references (default: "resources/genomes/")
  reference: # Your reference, in fasta format (default: "SARS-CoV-2_Wuhan_MN-908947-3")
  # Available options (not exhaustive), set one:
    - 'SARS-CoV-2_Wuhan_MN-908947-3'            # SARS-CoV-2  (Nextclade and Pangolin)
    - 'Monkeypox-virus_Zaire_AF-380138-1'       # Monkeypox   (Nextclade and Pangolin)
    #- 'Monkeypox-virus_UK_MT-903345-1'          # Monkeypox   (Nextclade and Pangolin)
    #- 'Swinepox-virus_India_MW-036632-1'        # Swinepox    (Nextclade)
    #- 'Ebola-virus_Zaire_AF-272001-1'           # Ebola       (na)
    #- 'Ebola-virus_Sudan_MH-121162-1'           # Ebola       (na)
    #- 'Measles-virus_NC-001498-1'                         # Measles (na)
    #- 'Measles-virus_B3_Khartoum-Sudan_MG-912590-1'       # Measles (na)
    #- 'Measles-virus_B3_Kole-Uganda_ON-642796-1'          # Measles (na)
    #- 'Measles-virus_B3_Bura-Kenya_MZ-615446-1_partial'   # Measles (na)
    #- 'Measles-virus_C2_Netherland-Bilthoven_MG-912589-1' # Measles (na)
    #- 'Measles-virus_H1_Netherland-Amsterdam_MG-912594-1' # Measles (na)
    #- 'Lassa-virus_NC-004297-1_Seg-L'           # Lassa-L NC  (na)
    #- 'Lassa-virus_NC-004297-1_Seg-S'           # Lassa-S NC  (na)
    #- 'Lassa-virus_MT-193282-1_BEN-16131_Seg-L' # Lassa-L MT  (na)
    #- 'Lassa-virus_MT-193282-1_BEN-16131_Seg-S' # Lassa-S MT  (na)
    #- 'Marburg-virus_NC_001608-3'               # Marburg     (na)
    #- 'Dengue-virus-1_NC-001477-1'              # Dengue 1    (na)
    #- 'Dengue-virus-2_NC-001474-2'              # Dengue 2    (na)
    #- 'Dengue-virus-3_NC-001475-2'              # Dengue 3    (na)
    #- 'Dengue-virus-4_NC-002640-1'              # Dengue 4    (na)
    #- 'Nipah-virus_Malaysia_AJ-564622-1'        # Nipah       (na)
    #- 'HIV-1_HXB2_K-03455-1'                    # HIV-1       (na)
    #- 'Human-herpesvirus-5_NC-006273-2'         # Herpes      (na)
    #- 'Human-herpesvirus-3_NC-001348-1'         # Varicella   (na)
    #- 'Human-adenovirus-A_NC-001460-1'          # Adeno       (na)
    #- 'Human-enterovirus-68_AY-426531-1'        # Entero      (na)
    #- 'Loa-loa_JH-712066-1_GCA_000183805-3'     # Loa loa V3  (na)
    #- '12S_sequences_Human-Bat-Rat.fasta'       # 12S         (na)
    #- 'Chikungunya-virus_HM-045817-1'           # Chikungunya (na)
    #- 'Add_your_favorite_genome'                # Other       (na)
  min_cov: # Minimum coverage, mask lower regions with "N" (default: "30") [INT] *** LoFreq ***
  # Available options (not exhaustive), set one:
    #- '60'                         # 60 x : for great coverage
    - '30'                         # 30 X : AFROSCREEN SARS-CoV-2 with Illumina amplicons sequencing (default)
    #- '10'                         # 10 X : for some applications...
    #- '3'                          #  3 X : only for exploration !
    #- 'Add_your_minimum_coverage'  # Custom minimum coverage
  min_freq: '0.2'  # Minimum allele frequency allowed (default: "0.2") [FLOAT] *** LoFreq ***
  iupac:        # Output variants in the form of IUPAC ambiguity codes (default: deactivate) *** LoFreq ***
  # Available options, set only one:
    - '--iupac-code' # Activate (default)
    #- ''             # Deactivate
  aligner: # Select your favorite aligner (default: 'bwa')
  # Available options, set one:
    - 'bwa'      # Better, Faster, (Stronger, Harder...)
    - 'bowtie2'  # Depreciated (slower),"sensitivity" requiried (see below "Bowtie2" options)
    - 'minimap2' # A versatile sequence alignment program
  caller: 'ivar'

###############################################################################
################################## LINEAGES ###################################
###############################################################################

###############################################################################
nextclade:
  path: 'resources/nextclade/' # Path to nextclade datasets (default "resources/nextclade/")
  dataset: # Nextclade dataset
  # Available options (not exhaustive), set only one:
    - 'sars-cov-2' # SARS-CoV-2 (default)
    #- 'MPXV'       # MPox - all clades 
    #- 'hMPXV'      # human MPox
    #- 'hMPXV_B1'   # human MPox - only lineage B1*

###############################################################################
pangolin: # na

    
###############################################################################
gisaid: ## TODO ##
  username: 'username'
  threshold: '30'
  name: 'hCoV-19'
  country: 'France'
  identifier: ''
  year: '2022'


###############################################################################
################################## VARIANTS ###################################
###############################################################################

################################################################################
ivar:
  #min_depth: '0'    # Minimum read depth to call variants (Default: "0") [INT] *** iVar ***
  #min_freq: '0.03'  # Minimum frequency threshold to call variants (Default: "0.03") [FLOAT] *** iVar ***
  #min_insert: '0.8' # Minimum insertion frequency threshold to call variants (Default: "0.8") [FLOAT] *** iVar ***
  max_depth: '1000000' # Max per-file depth; avoids excessive memory usage (default: "8000", recomanded "1000000") [INT]
  min_bq: '0'          # -Q: Skip bases with baseQ/BAQ smaller than (default: "13", recomanded: "0") [INT]
  min_qual: '0'        # -q: Minimum quality score threshold to count base (Default: "20", recomanded: "0") [INT]
  map_qual:            # Disable BAQ, per-Base Alignment Quality (default: "--no-BAQ")
  # Available options, set only one:
  - '--no-BAQ' # no, don't merge mapping quality (default)
  #- ''         # yes, merge mapping quality (not recommanded with Samtools)


###############################################################################
############################## PRIMER CLEAPING  ###############################
###############################################################################

###############################################################################
bamclipper:
  path: 'resources/primers/bedpe/' # Path to primers bedpe files (default "resources/primer/bedpe")
  primers: # Your primer set, in BEDPE format (no default: you need to know which kit / ref you used)
  # Reference sequence names and coordinates of BAM and BED are assumed to be derived from identical reference sequences
  # Available options (not exhaustive), set only one:
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V4-1'         # SARS-CoV-2 Artic V4.1 (update to the V4, see Artic README)
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V4'           # SARS-CoV-2 Artic V4 (not based on V3, see Artic README)
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V3'           # SARS-CoV-2 Artic V3
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V2'           # SARS-CoV-2 Artic V2
    #- 'SARS-CoV-2_Wuhan_MN-908947-3_artic-primers-V1'           # SARS-CoV-2 Artic V1
    #- 'Ebola-virus_Zaire_KR-063671-1_artic-primers-V3'          # EBOV Artic V3
    #- 'Ebola-virus_Zaire_AF-272001-1_artic-primers-V2'          # EBOV Artic V2 (based on AF272001.1)    
    #- 'Ebola-virus_Zaire_KR-063671-1_artic-primers-V1'          # EBOV Artic V1
    #- 'Nipah-virus_Malaysia_AJ-564622-1_artic-primers-V1'       # NIV Artic V1
    #- 'Monkeypox-virus_UK_MT-903345-1_custom-VGCARE-primers-V1' # MPXV VGCARE V1
    #- 'Add_your_favorite_amplicon_kit'                          # Custom
  upstream: '5'   # (default: "5")
  downstream: '5' # (default: "5")


###############################################################################
################################### MAPPING ###################################
###############################################################################

###############################################################################
bwa:
  path: 'resources/indexes/bwa/' # Path to BWA indexes (default: "resources/indexes/bwa/")
  algorithm: # Algorithm for constructing BWA index (default: auto --> '')
  # Available options, set only one:
    - ''         # Auto-select (default)
    #- '-a is'    # Moderately fast, but does not work with database larger than 2GB
    #- '-a bwtsw' # This method works with the whole human genome

###############################################################################
bowtie2:
  path: 'resources/indexes/bowtie2/' # Path to Bowtie2 indexes (default: "resources/indexes/bowtie2/")
  algorithm: # Algorithm for constructing BT2 index (default: small --> '')
  # Available options, set only one:
    - ''              # (default)
    #- '--large-index' # Force generated index to be "large", even if reference has fewer than 4 billion nucleotides
  sensitivity: # Bowtie2 'sensitivity' preset (default: "--very-sensitive")
  # Available preset options, set only one:
    - '--very-sensitive' # Same as options: "-D 20 -R 3 -N 0 -L 20 -i S,1,0.50" (default)
    #- '--sensitive'      # Same as options: "-D 15 -R 2 -N 0 -L 22 -i S,1,1.15"
    #- '--fast'           # Same as options: "-D 10 -R 2 -N 0 -L 22 -i S,0,2.50"    
    #- '--very-fast'      # Same as options: "-D 5 -R 1 -N 0 -L 22 -i S,0,2.50"

###############################################################################
minimap2:
  path: 'resources/indexes/minimap2/' # Path to Minimap2 indexes (default: "resources/indexes/minimap2/")
  algorithm:
    k-mer_size: '21'     # -k: k-mer size (default: "21", no larger than "28") [INT]
    minimizer_size: '11' # -w: minimizer window size (default: "11") [INT]
    split_size: '8G'     # -I: split index for every {NUM} input bases (default: "8G") [INT]
    homopolymer:         # -H: use homopolymer-compressed k-mer  (default: no --> '')
    # Available options, set only one: 
      - ''   # no (default)
      #- '-H' # yes (preferrable for PacBio)
  preset: # -x: Minimap2 presets (always applied before other options)
  # Available preset options, set only one: 
    - 'sr'        # genomic short-read mapping, like Illumina (default)
    #- 'map-ont'   # Nanopore vs reference mapping
    #- 'ava-ont'   # Nanopore read overlap
    #- 'splice'    # Long-read spliced alignment
    #- 'map-pb'    # PacBio vs reference mapping
    #- 'map-hifi'  # PacBio HiFi reads vs reference mapping
    #- 'ava-pb'    # PacBio read overlap
    #- 'splice:hq' # Pacbio-CCS spliced alignment
    #- 'asm5'      # asm-to-ref mapping, for ~0.1% sequence divergence
    #- 'asm10'     # asm-to-ref mapping, for ~1.0% sequence divergence
    #- 'asm20'     # asm-to-ref mapping, for ~5.0% sequence divergence


###############################################################################
################################## TRIMMING ###################################
###############################################################################

###############################################################################
sickle_trim:
  quality: '30'      # Phred score limit (default: "30")
  length: '50'       # Read length limit after trim (default: "50")
  command: 'pe'      # Reading (default and should be "pe" for paired-end sequences)
  encoding: 'sanger' # Quality encoding (default SHOULD BE "sanger")
  # Only for information:
    ###- 'sanger'   # for CASAVA >= 1.8 for "recent" Illumina reads (default)
    ###- 'illumina' # for CASAVA 1.3 to 1.7 for "old" Illumina reads
    ###- 'solexa'   # for CASAVA < 1.3 for Solexa

###############################################################################
cutadapt:
  length: '50' # Discard reads shorter than 'length' after trim (default: "50")
  kits: # Sequence of an adapter ligated to the 3' end of the first read (default: Illumina)
    truseq:  'AGATCGGAAGAGC'         # Illumina "TruSeq" or "ScriptSeq" based libraries kits
    nextera: 'CTGTCTCTTATACACATC'    # Illumina "Nextera" or "TruSight" based libraries kits
    small:   'TGGAATTCTCGGGTGCCAAGG' # Illumina "Small" based libraries kits
  clipping: '0' # Cut 'n' first nucleotides of each reads (default: 0)


###############################################################################
############################### QUALITY CONTROL ###############################
###############################################################################

###############################################################################
multiqc: ## TODO ##
  path: 'configuration/multiqc/' # Path to the multiqc configuration file
  config: # Multiqc configuration file (default: default.yaml)
  # Available options (not exhaustive), set only one:
    - 'default.yaml' # default
    #- ''             #
    #- ''             #
  tag: '' # Use only modules which tagged with this keyword

###############################################################################
fastq_screen:
  config: 'configuration/fastq-screen.conf' # Path to the fastq-screen configuration file
  subset: '10000' # Don't use whole sequences, but a subset reads (default: "10000") [INT] (0=all)


###############################################################################
#################################### SYSTEM ###################################
###############################################################################

###############################################################################
conda:
  envs: # Conda environement yaml files:
    bamclipper:    'envs/bamclipper_v.1.0.0.yaml'      # Bamclipper    ver. 1.0.0
    bcftools:      'envs/bcftools_v.1.20.yaml'         # Bcftools      ver. 1.20
    bedtools:      'envs/bedtools_v.2.31.1.yaml'       # Bedtools      ver. 2.31.1
    bowtie2:       'envs/bowtie2_v.2.5.4.yaml'         # Bowtie2       ver. 2.5.4
    bwa:           'envs/bwa_v.0.7.18.yaml'            # BWA           ver. 0.7.18
    cutadapt:      'envs/cutadapt_v.4.9.yaml'          # Cutadapt      ver. 4.9
    fastq_screen:  'envs/fastq-screen_v.0.15.3.yaml'   # Fastq-Screen  ver. 0.15.3 (with BWA ver. 0.7.18)
    fastqc:        'envs/fastqc_v.0.12.1.yaml'         # FastQC        ver. 0.12.1
    gawk:          'envs/gawk_v.5.3.0.yaml'            # Awk (GNU)     ver. 5.3.0
    ivar:          'envs/ivar_v.1.4.3.yaml'            # iVar          ver. 1.4.3 (with Samtools ver. 1.20)
    minimap2:      'envs/minimap2_v.2.28.yaml'         # Minimap2      ver. 2.28
    multiqc:       'envs/multiqc_v.1.23.yaml'          # MultiQC       ver. 1.23 (with Pandoc ver. 3.3)
    nextclade:     'envs/nextclade_v.3.9.1.yaml'       # Nextclade     ver. 3.9.1
    pangolin:      'envs/pangolin_v.4.3.yaml'          # Pangolin      ver. 4.3
    samtools:      'envs/samtools_v.1.20.yaml'         # Samtools      ver. 1.20
    sickle_trim:   'envs/sickle-trim_v.1.33.yaml'      # Sickle-trim   ver. 1.33
    tsv2vcf:       'envs/tsv2vcf_v.1.1.yaml'           # tsv2vcf       ver. 1.1 (bcftools biopython numpy)
    workflow_base: 'envs/workflow-base_v.2024.11.yaml' # Workflow-Base ver. 2024.11

###############################################################################

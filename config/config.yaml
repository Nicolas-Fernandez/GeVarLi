report: # Snakemake reports formats
  stat:
    extention: # [LIST]
      - 'txt'
      - 'tsv'
      - 'json'
  graph:
    type: # [LIST]
      - 'dag'
      - 'rulegraph'
      - 'filegraph'
    extention: # [LIST]
      - 'png'
      - 'svg'
      - 'pdf'


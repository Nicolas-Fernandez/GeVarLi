    fastqc:       '../envs/osx/fastqc-0.11.9.yaml'         # FastQC       ver. 0.11.9
    gawk:         '../envs/osx/gawk-5.1.0.yaml'            # Awk          ver. 5.1.0
    lofreq:       '../envs/osx/lofreq-2.1.5.yaml'          # Lofreq       ver. 2.1.5

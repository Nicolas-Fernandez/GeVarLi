### RESOURCES ----------------------------------------------------------------------------------------
resources:
  cpus: 12           # Set maximum cpus usage (for multithreading, default: 8) [INT]
  ram: 54           # Set maximum memory usage (in Gb, default: 16) [INT]
  tmpdir: '$TMPDIR' # Temporary directory (default: '$TMPDIR')
  ## Examples:
    ## '$TMPDIR'  # System variable $TMPDIR (dafault)
    ## '.'        # Local (i.e. GeVarLi root directory)
    ## '/scratch' # HPC (set it to match your HPC usage)

#snakemake_version: '7.18.1' # Snakemake version (upgrade from  6.12.3)
conda_frontend: 'mamba'     # Conda frontend (conda or mamba)


### CLUSTER ------------------------------------------------------------------------------------------
resources:
  cpus: 4            # Set maximum cpus usage (for multithreading) [INT]
  mem_gb: 4          # Set maximum memory unsage (in Gb) [INT]
  tmpdir: '$TMPDIR'  # Temporary directory (default: '$TMPDIR')
    ## '$TMPDIR'      # System variable $TMPDIR (dafault)
    ## '.'            # Local (i.e. GeVarLi root directory)
    ## '/scratch'     # HPC (set it to match your HPC usage)

### ENVIRONNEMENTS -----------------------------------------------------------------------------------
conda:                                             # Conda environement yaml files:
  fastqc:       '../envs/fastqc-0.11.9.yaml'       # FastQC       ver. 0.11.9
  fastq-screen: '../envs/fastq-screen-0.14.0.yaml' # Fastq-Screen ver. 0.14.0
  multiqc:      '../envs/multiqc-1.11.yaml'        # MultiQC      ver. 1.11
  cutadapt:     '../envs/cutadapt-3.5.yaml'        # Cutadapt     ver. 3.5
  sickle-trim:  '../envs/sickle-trim-1.33.yaml'    # Sickle-trim  ver. 1.33
  bowtie2:      '../envs/bowtie2-2.4.4.yaml'       # Bowtie2      ver. 2.4.4
  bwa:          '../envs/bwa-0.7.17.yaml'          # BWA          ver. 0.7.17
  samtools:     '../envs/samtools-1.14.yaml'       # Samtools     ver. 1.14
  bedtools:     '../envs/bedtools-2.30.0.yaml'     # Bedtools     ver. 2.30.0
  bcftools:     '../envs/bcftools-1.14.yaml'       # Bcftools     ver. 1.14
  gawk:         '../envs/gawk-5.1.0.yaml'          # Awk          ver. 5.1.0
  lofreq:       '../envs/lofreq-2.1.5.yaml'        # Lofreq       ver. 2.1.5
  pangolin:     '../envs/pangolin-3.1.17.yaml'     # Pangolon     ver. 3.1.17
  nextclade:    '../envs/nextclade-1.11.0.yaml'    # Nextclade    ver. 1.11.0

### ALIGNER ------------------------------------------------------------------------------------------
aligner: 'bwa' # Select your favorite aligner (default: 'bwa')
  ## 'bwa'      # Faster (default)
  ## 'bowtie2'  # Slower, 'sensitivity' requiried and should be set (see below "Bowtie2" options)

### CONSENSUS ----------------------------------------------------------------------------------------
consensus:
  reference: 'resources/genomes/SARS-CoV-2_Wuhan-WIV04_2019.fasta' # Path to your favorite reference
  mincov: 10 # Minimum coverage, mask lower regions with 'N' (default: '10') [INT]
  minaf: 0.2 # Minimum allele frequency allowed (default: '0.2') [FLOAT]
  iupac:     # Output variants in the form of IUPAC ambiguity codes
    - ''        # Deactivate
    #- '--iupac' # Activate

### BWA ----------------------------------------------------------------------------------------------
bwa:
  index: 'resources/indexes/bwa/SARS-CoV-2_Wuhan-WIV04_2019' # BWA indexes (default: SARS-CoV-2 Wuhan WIV04 2019 NC_045512.2)

### BOWTIE2 ------------------------------------------------------------------------------------------
bowtie2:
  index: 'resources/indexes/bowtie2/SARS-CoV-2_Wuhan-WIV04_2019' # Bowtie2 indexes (default: SARS-CoV-2 Wuhan WIV04 2019 NC_045512.2)
  sensitivity: '--sensitive' # Bowtie2 sensitivity preset (default: '--sensitive')
    ## '--very-fast'          # Same as: -D 5 -R 1 -N 0 -L 22 -i S,0,2.50
    ## '--fast'               # Same as: -D 10 -R 2 -N 0 -L 22 -i S,0,2.50
    ## '--sensitive'          # Same as: -D 15 -R 2 -N 0 -L 22 -i S,1,1.15 (default)
    ## '--very-sensitive'     # Same as: -D 20 -R 3 -N 0 -L 20 -i S,1,0.50

### NEXTCLADE ----------------------------------------------------------------------------------------
nextclade:
  dataset: 'resources/nextclade/sars-cov-2/' # Nextclade sars-cov-2 default dataset (for nextclade 1.10.1)

### SICKLE-TRIM --------------------------------------------------------------------------------------
sickle-trim:
  command: 'pe'      # Reading (default and should be 'pe' for paired-end sequences)
  encoding: 'sanger' # Quality encoding (dafault and sould be 'sanger')
    ## 'sanger'       # CASAVA >= 1.8 for "recent" Illumina reads (default)
    ## 'illumina'     # CASAVA 1.3 to 1.7 for "old" Illumina reads
    ## 'solexa'       # CASAVA < 1.3 for Solexa
  quality: '30'      # Phred score limit (default: '30')
  length: '25'       # Read length limit after trim (default: '25')

### CUTADAPT -----------------------------------------------------------------------------------------
cutadapt:
  length: '25' # Discard reads shorter than 'length' after trim (default: '25')
  kits:        # Sequence of an adapter ligated to the 3' end of the first read
    truseq:  'AGATCGGAAGAGC'         # Illumina "TruSeq" or "ScriptSeq" based libraries kits
    nextera: 'CTGTCTCTTATACACATC'    # Illumina "Nextera" or "TruSight" based libraries kits
    small:   'TGGAATTCTCGGGTGCCAAGG' # Illumina "Small" based libraries kits

### FASTQSCREEN --------------------------------------------------------------------------------------
fastq-screen:
  config: 'config/fastq-screen.conf' # Path to the fastq-screen configuration file
  subset: 1000                       # Don't use the whole sequence file, but sub-dataset of specified number of read (default: '1000') [INT] (0='all')
  aligner: 'bwa'                     # Aligner for fastq-screen (default and should be 'bwa')
    ## 'bwa'                          # Burrows-Wheeler Aligner (default) [small indexes provided, see 'fastq-screen.conf' file]
    ## 'bowtie'                       # Bowtie [indexes not provided]
    ## 'bowtie2'                      # Bowtie2 [indexes not provided]

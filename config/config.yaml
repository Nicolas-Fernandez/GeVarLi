###############################################################################

## CLUSTER -------------------------------------------------------------------------------------------
resources:
  cpus: 12      # cpus
  mem_mb: 64000 # mem in Mb
  mem_gb: 64    # mem in Gb
  time: 1140    # time in Min
  tmpdir: '$TMPDIR'  # temporary directory (default $TMPDIR)
  #tmpdir: '.'        # temporary directory (local)
  #tmpdir: '/scratch' # temporary directory (HPC)
   
## ENVIRONNEMENTS ------------------------------------------------------------------------------------
conda:
  fastqc:       '../envs/fastqc-0.11.9.yaml'
  fastq-screen: '../envs/fastq-screen-0.14.0.yaml'
  multiqc:      '../envs/multiqc-1.11.yaml'          # Update from 1.10.1
  cutadapt:     '../envs/cutadapt-3.5.yaml'          # Update from 3.4
  sickle-trim:  '../envs/sickle-trim-1.33.yaml'
  bowtie2:      '../envs/bowtie2-2.4.4.yaml'         # Update from 2.4.2
  bwa:          '../envs/bwa-0.7.17.yaml'
  samtools:     '../envs/samtools-1.14.yaml'
  bedtools:     '../envs/bedtools-2.30.0.yaml'
  bcftools:     '../envs/bcftools-1.14.yaml'
  lofreq:       '../envs/lofreq-2.1.5.yaml'
  pangolin:     '../envs/pangolin-3.1.17.yaml'

## ALIGNER --------------------------------------------------------------------------------------------
aligner: # Choose (de/comment) one or both aligners
  - bwa     # fast
  #- bowtie2 # sensitivity requiried, see below "Bowtie2" options
  
## CONSENSUS -----------------------------------------------------------------------------------------
consensus:
  reference: # Choose (de/comment) or add one unique reference
    - 'resources/genomes/SARS-CoV-2_Wuhan-WIV04_2019.fasta' # SARS-CoV-2 Wuhan WIV04 2019 NC_045512.2
  mincov: # Minimum coverage for masking regions in consensus sequence (default: 10) [INT]
  #- '0' # Only for testing !
  #- '1' # Only for testing ! (default DNAstar)
  #- '5' # Only for testing !
  - '10' # Only for testing ! (default CNR Lyon)
  #- '30' # Only for testing ! (recomanded)
  
## INDEL ---------------------------------------------------------------------------------------------
indel:
  covmin: '10'  # Minimum allele freq allowed (<1=off) (FLOAT)
  afmin: '0.2' # Minimum coverage allowed (<1=off) (INT)

## BWA ------------------------------------------------------------------------------------------------
bwa:
  index: # Choose (de/comment) or add one unique bwa indexes
    - 'resources/databases/bwa/SARS-CoV-2_Wuhan-WIV04_2019' # SARS-CoV-2 Wuhan WIV04 2019 NC_045512.2

## BOWTIE2 -------------------------------------------------------------------------------------------
bowtie2:
  index: # Choose (de/comment) or add one unique bowtie2 indexes
    - 'resources/databases/bowtie2/SARS-CoV-2_Wuhan-WIV04_2019' # SARS-CoV-2 Wuhan WIV04 2019 NC_045512.2
  sensitivity: # Choose (de/comment) one unique sensitivity preset
    #- '--very-fast'       # Same as: -D 5 -R 1 -N 0 -L 22 -i S,0,2.50
    #- '--fast'            # Same as: -D 10 -R 2 -N 0 -L 22 -i S,0,2.50
    # '--sensitive'       # Same as: -D 15 -R 2 -N 0 -L 22 -i S,1,1.15 (default)
    - '--very-sensitive'  # Same as: -D 20 -R 3 -N 0 -L 20 -i S,1,0.50

## SICKLE-TRIM ---------------------------------------------------------------------------------------
sickle-trim:
  command: 'pe' # should be 'pe' if paired-end sequences (default) or 'se' if single-end sequences
  encoding: # choose one unique encoding (sould be 'sanger')
    - 'sanger'   # CASAVA >= 1.8 for 'recent' Illumina (default)
    #- 'illumina' # CASAVA 1.3 to 1.7 for 'old' Illumina
    #- 'solexa'   # CASAVA < 1.3 for Solexa
  quality: '30'   # phred score limit (default: 30)
  length: '25'    # read length limit after trim (default: 25)

## CUTADAPT ------------------------------------------------------------------------------------------
cutadapt:
  length: '25' # Discard reads shorter than 'length' after trim (default: 25)
  kits:        # Sequence of an adapter ligated to the 3' end of the first read
    truseq:      'AGATCGGAAGAGC'                     # Illumina TruSeq / ScriptSeq based kits libraries
    nextera:     'CTGTCTCTTATACACATC'                # Illumina Nextera / TruSight based kits libraries
    small:       'TGGAATTCTCGGGTGCCAAGG'             # Illumina Small based kits libraries

## FASTQSCREEN ---------------------------------------------------------------------------------------
fastq-screen:
  config: 'config/fastq-screen.conf' # path to the fastq-screen configuration file
  subset: '1000' # Don't use the whole sequence file, but create a temporary dataset of this specified number of read (set '0' for all dataset)
  aligner: # Choose (de/comment) one unique aligner for fastq-screen (note: we provide bwa indexes, if bowtie, please use bowtie indexes and edit fastq-screen.conf file)
    - 'bwa'     # Burrows-Wheeler Aligner, for mapping low-divergent sequences against a large reference genome (default)
    #- 'bowtie'  # Bowtie, an ultrafast, memory-efficient short read aligner
    #- 'bowtie2' # Bowtie2, an ultrafast and memory-efficient tool for aligning sequencing reads to long reference sequences
